<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Хто зверху? — онлайн</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" id="app">
      <header class="top">
        <div class="show-logo" aria-label="Хто зверху">
          <span class="logo-top">ХТО</span>
          <span class="logo-bottom">ЗВЕРХУ</span>
          <span class="logo-mark">?</span>
        </div>
        <div class="brand">
          <span>онлайн пати-гра</span>
          <h1>Дівчата проти хлопців</h1>
        </div>
        <div class="top-actions">
          <label class="volume-control">
            <span>Гучність</span>
            <input id="volumeSlider" type="range" min="0" max="100" value="6" />
          </label>
          <div class="mode" id="modeBadge">Меню</div>
        </div>
      </header>
      <audio id="introAudio" src="assets/intro.mp3" preload="auto" loop></audio>

      <section class="score" id="scoreBar" hidden>
        <article class="team girls" id="girlsCard">
          <span id="girlsScoreName">Дівчата</span>
          <strong id="girlsScore">0</strong>
        </article>
        <article class="team boys" id="boysCard">
          <span id="boysScoreName">Хлопці</span>
          <strong id="boysScore">0</strong>
        </article>
      </section>

      <div id="connBanner" class="conn-banner" hidden>Зʼєднання втрачено — перепідключення…</div>
      <div id="toast" class="toast" hidden></div>

      <!-- HOME: create or join -->
      <section class="screen setup" id="homeScreen">
        <div class="hero-panel">
          <p class="kicker">Створи кімнату</p>
          <h2>Нова гра</h2>
          <div class="form-grid">
            <label>
              <span>Твоє імʼя</span>
              <input id="hostNameInput" placeholder="Наприклад: Саша" autocomplete="off" />
            </label>
            <label>
              <span>Ти за команду</span>
              <select id="hostTeamSelect">
                <option value="girls">Дівчата</option>
                <option value="boys">Хлопці</option>
              </select>
            </label>
            <label>
              <span>Рожева команда</span>
              <input id="girlsNameInput" value="Дівчата" autocomplete="off" />
            </label>
            <label>
              <span>Синя команда</span>
              <input id="boysNameInput" value="Хлопці" autocomplete="off" />
            </label>
            <label>
              <span>Плейлист (музика)</span>
              <select id="presetSelect"></select>
            </label>
            <label>
              <span>Раундів</span>
              <input id="roundsInput" type="number" min="1" max="60" value="10" />
            </label>
          </div>
          <div class="rounds-pick">
            <span class="pick-title">Раунди у грі</span>
            <div class="round-types" id="roundTypesPick"></div>
          </div>
          <div class="buttons">
            <button class="primary pink" type="button" id="createRoomButton">Створити кімнату</button>
          </div>
        </div>

        <div class="hero-panel small">
          <p class="kicker">Запрошення</p>
          <h2>Зайти в гру</h2>
          <div class="form-grid single">
            <label>
              <span>Код кімнати</span>
              <input id="roomCodeInput" autocomplete="off" maxlength="5" />
            </label>
            <label>
              <span>Імʼя</span>
              <input id="playerNameInput" placeholder="Наприклад: Саша" autocomplete="off" />
            </label>
            <label>
              <span>Команда</span>
              <select id="playerTeamSelect">
                <option value="girls">Дівчата</option>
                <option value="boys">Хлопці</option>
              </select>
            </label>
          </div>
          <div class="buttons">
            <button class="primary blue" type="button" id="joinButton">Зайти</button>
          </div>
        </div>
      </section>

      <!-- LOBBY -->
      <section class="screen lobby hidden" id="lobbyScreen">
        <div class="room-code">
          <span>Код кімнати</span>
          <strong id="lobbyCode">-----</strong>
        </div>
        <div class="invite">
          <input id="inviteLink" readonly />
          <button class="secondary" type="button" id="copyInviteButton">Скопіювати</button>
        </div>
        <ul class="players" id="playersList"></ul>
        <div class="lobby-controls" id="lobbyControls">
          <label>
            <span>Плейлист</span>
            <select id="lobbyPresetSelect"></select>
          </label>
          <label>
            <span>Раундів</span>
            <input id="lobbyRoundsInput" type="number" min="1" max="60" value="10" />
          </label>
          <div class="rounds-pick">
            <span class="pick-title">Раунди у грі</span>
            <div class="round-types" id="lobbyRoundTypesPick"></div>
          </div>
        </div>
        <button class="primary pink wide" type="button" id="startGameButton">Почати гру</button>
        <p class="lobby-hint" id="lobbyHint"></p>
      </section>

      <!-- GAME -->
      <section class="screen game hidden" id="gameScreen">
        <div class="round-line">
          <span id="roundLabel">Раунд 1/10</span>
          <strong id="activeTeamName">Дівчата</strong>
          <b id="roundTypeBadge">5 слів</b>
        </div>
        <div id="roundStage"></div>
      </section>

      <!-- FINAL -->
      <section class="screen final hidden" id="finalScreen">
        <div class="result-card">
          <p class="kicker">Фінал</p>
          <h2 id="winnerTitle">Перемога</h2>
          <p id="winnerText"></p>
          <button class="primary blue" type="button" id="backLobbyButton">Нова гра</button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
