services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: khz
      POSTGRES_PASSWORD: khz
      POSTGRES_DB: khz
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khz"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://khz:khz@postgres:5432/khz?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      WEB_DIR: "/app/web"
      PUBLIC_URL: "${PUBLIC_URL:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
